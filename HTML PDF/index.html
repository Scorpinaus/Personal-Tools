<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDF Reader</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f4;
      --panel: #ffffff;
      --ink: #202322;
      --muted: #626a67;
      --line: #d8ddda;
      --accent: #087f72;
      --accent-strong: #06695e;
      --danger: #a13d34;
      --danger-strong: #803027;
      --canvas-bg: #d5d8d6;
      --paper-shadow: 0 16px 42px rgba(20, 24, 22, 0.22);
      --shadow: 0 18px 50px rgba(32, 35, 34, 0.12);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background:
        linear-gradient(180deg, rgba(8, 127, 114, 0.08), transparent 240px),
        var(--bg);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 100%;
      padding: 18px;
      gap: 14px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 64px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 30px rgba(32, 35, 34, 0.08);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .document-name {
      min-height: 1.25rem;
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: min(52vw, 760px);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 116px;
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 0 14px;
      color: #ffffff;
      background: var(--accent);
      cursor: pointer;
      font-weight: 680;
      line-height: 1;
      transition:
        background-color 140ms ease,
        border-color 140ms ease,
        box-shadow 140ms ease,
        transform 140ms ease;
    }

    .button:hover {
      background: var(--accent-strong);
    }

    .button:active {
      transform: translateY(1px);
    }

    .button:focus-visible {
      outline: 3px solid rgba(8, 127, 114, 0.24);
      outline-offset: 2px;
    }

    .button.secondary {
      background: #ffffff;
      border-color: #d2d8d5;
      color: var(--danger);
    }

    .button.secondary:hover {
      border-color: rgba(161, 61, 52, 0.34);
      color: var(--danger-strong);
      background: #fff8f7;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      transform: none;
    }

    .button svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .pdf-toolbar {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 52px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(32, 35, 34, 0.07);
      backdrop-filter: blur(12px);
    }

    .control-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 36px;
      padding: 4px;
      background: #f7f9f8;
      border: 1px solid #dfe4e1;
      border-radius: 8px;
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
      transition:
        background-color 140ms ease,
        border-color 140ms ease,
        color 140ms ease,
        transform 140ms ease;
    }

    .icon-button:hover {
      background: #ffffff;
      border-color: #ced6d2;
      color: var(--accent-strong);
    }

    .icon-button:active {
      transform: translateY(1px);
    }

    .icon-button:focus-visible,
    .page-number:focus-visible {
      outline: 3px solid rgba(8, 127, 114, 0.22);
      outline-offset: 2px;
    }

    .icon-button:disabled,
    .page-number:disabled {
      cursor: not-allowed;
      opacity: 0.42;
      transform: none;
    }

    .icon-button[aria-pressed="true"] {
      color: #ffffff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .icon-button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .page-meter {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 8px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1;
      white-space: nowrap;
    }

    .page-number {
      width: 64px;
      height: 30px;
      border: 1px solid #cdd5d1;
      border-radius: 6px;
      padding: 0 8px;
      color: var(--ink);
      background: #ffffff;
      text-align: center;
    }

    .page-number::-webkit-inner-spin-button,
    .page-number::-webkit-outer-spin-button {
      opacity: 1;
    }

    .total-pages,
    .zoom-level {
      min-width: 58px;
      color: var(--muted);
    }

    .zoom-level {
      display: inline-grid;
      place-items: center;
      min-width: 112px;
      height: 30px;
      padding: 0 10px;
      color: var(--ink);
      background: #ffffff;
      border: 1px solid #d7ddda;
      border-radius: 6px;
      font-size: 0.88rem;
      font-weight: 650;
      white-space: nowrap;
    }

    .search-input {
      width: clamp(150px, 22vw, 260px);
      height: 30px;
      border: 1px solid #cdd5d1;
      border-radius: 6px;
      padding: 0 9px;
      color: var(--ink);
      background: #ffffff;
      font-size: 0.88rem;
    }

    .search-input:focus-visible {
      outline: 3px solid rgba(8, 127, 114, 0.22);
      outline-offset: 2px;
    }

    .search-input:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .search-count {
      display: inline-grid;
      place-items: center;
      min-width: 74px;
      height: 30px;
      padding: 0 8px;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .reader {
      position: relative;
      display: grid;
      min-height: 0;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 420px;
      padding: 36px;
      text-align: center;
      color: var(--muted);
    }

    .empty-state[hidden],
    .canvas-stage[hidden] {
      display: none;
    }

    .empty-state strong {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
      font-size: clamp(1.25rem, 2vw, 1.8rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .empty-state p {
      max-width: 34rem;
      margin: 0;
      font-size: 0.98rem;
      line-height: 1.55;
    }

    .canvas-stage {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 0;
      background: var(--canvas-bg);
    }

    .reader-body {
      display: grid;
      grid-template-columns: minmax(210px, 280px) minmax(0, 1fr);
      min-height: 0;
    }

    .reader-body.outline-hidden {
      grid-template-columns: minmax(0, 1fr);
    }

    .outline-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-width: 0;
      min-height: 0;
      background: #f8faf9;
      border-right: 1px solid rgba(32, 35, 34, 0.14);
    }

    .outline-panel[hidden] {
      display: none;
    }

    .outline-header {
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.74);
      border-bottom: 1px solid rgba(32, 35, 34, 0.12);
    }

    .outline-title {
      display: block;
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 720;
      line-height: 1.2;
    }

    .outline-status {
      display: block;
      min-height: 1.1rem;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.25;
    }

    .outline-scroll {
      min-height: 0;
      overflow: auto;
      padding: 10px 8px 14px;
    }

    .bookmark-section {
      display: grid;
      gap: 6px;
      padding: 8px 0 12px;
    }

    .bookmark-section + .bookmark-section {
      border-top: 1px solid #dde4e0;
    }

    .bookmark-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 30px;
      padding: 0 6px 0 8px;
    }

    .bookmark-section-title {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 760;
      line-height: 1;
      text-transform: uppercase;
    }

    .outline-list {
      display: grid;
      gap: 2px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .outline-list .outline-list {
      margin-top: 2px;
      padding-left: 14px;
      border-left: 1px solid #dfe5e2;
    }

    .outline-item {
      margin: 0;
      padding: 0;
    }

    .outline-button {
      display: block;
      width: 100%;
      min-height: 30px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 6px 8px;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
      font-size: 0.84rem;
      line-height: 1.28;
      text-align: left;
      overflow-wrap: anywhere;
      transition:
        background-color 140ms ease,
        border-color 140ms ease,
        color 140ms ease;
    }

    .outline-button:hover {
      color: var(--accent-strong);
      background: #ffffff;
      border-color: #d6ddda;
    }

    .outline-button:focus-visible {
      outline: 3px solid rgba(8, 127, 114, 0.2);
      outline-offset: 1px;
    }

    .outline-button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
    }

    .outline-button.is-bold {
      font-weight: 720;
    }

    .outline-button.is-italic {
      font-style: italic;
    }

    .user-bookmark-list {
      display: grid;
      gap: 4px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .user-bookmark-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 4px;
      min-width: 0;
    }

    .user-bookmark-link {
      display: grid;
      gap: 2px;
      min-width: 0;
      min-height: 34px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 6px 8px;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
      text-align: left;
      transition:
        background-color 140ms ease,
        border-color 140ms ease,
        color 140ms ease;
    }

    .user-bookmark-link:hover {
      color: var(--accent-strong);
      background: #ffffff;
      border-color: #d6ddda;
    }

    .bookmark-title,
    .bookmark-page {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bookmark-title {
      font-size: 0.84rem;
      font-weight: 650;
      line-height: 1.2;
    }

    .bookmark-page {
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.1;
    }

    .bookmark-actions {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding-right: 2px;
    }

    .bookmark-action {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition:
        background-color 140ms ease,
        border-color 140ms ease,
        color 140ms ease;
    }

    .bookmark-action:hover {
      color: var(--accent-strong);
      background: #ffffff;
      border-color: #d6ddda;
    }

    .bookmark-action.danger:hover {
      color: var(--danger-strong);
      border-color: rgba(161, 61, 52, 0.28);
      background: #fff8f7;
    }

    .bookmark-action:disabled {
      cursor: not-allowed;
      opacity: 0.46;
    }

    .bookmark-action svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .bookmark-empty {
      margin: 0;
      padding: 3px 8px 8px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.35;
    }

    .bookmark-empty[hidden] {
      display: none;
    }

    .bookmark-editor {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 4px;
      align-items: center;
      min-width: 0;
    }

    .bookmark-edit-input {
      width: 100%;
      height: 32px;
      border: 1px solid #cdd5d1;
      border-radius: 6px;
      padding: 0 8px;
      color: var(--ink);
      background: #ffffff;
      font-size: 0.84rem;
    }

    .bookmark-edit-input:focus-visible,
    .user-bookmark-link:focus-visible,
    .bookmark-action:focus-visible {
      outline: 3px solid rgba(8, 127, 114, 0.2);
      outline-offset: 1px;
    }

    .canvas-scroll {
      min-height: 0;
      overflow: auto;
      padding: 28px;
    }

    .page-shell {
      position: relative;
      display: flex;
      justify-content: center;
      min-width: min-content;
      background: #ffffff;
      box-shadow: var(--paper-shadow);
    }

    .pdf-canvas {
      display: block;
      max-width: none;
      background: #ffffff;
    }

    .textLayer {
      --min-font-size: 1;
      --text-scale-factor: calc(var(--total-scale-factor) * var(--min-font-size));
      --min-font-size-inv: calc(1 / var(--min-font-size));
      position: absolute;
      inset: 0;
      overflow: clip;
      opacity: 1;
      line-height: 1;
      text-align: initial;
      text-size-adjust: none;
      forced-color-adjust: none;
      transform-origin: 0 0;
      z-index: 2;
    }

    .textLayer :is(span, br) {
      position: absolute;
      color: transparent;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
    }

    .textLayer > :not(.markedContent),
    .textLayer .markedContent span:not(.markedContent) {
      z-index: 1;
      --font-height: 0;
      --scale-x: 1;
      --rotate: 0deg;
      font-size: calc(var(--text-scale-factor) * var(--font-height));
      min-height: calc(var(--text-scale-factor) * var(--font-height));
      transform: rotate(var(--rotate)) scaleX(var(--scale-x)) scale(var(--min-font-size-inv));
    }

    .textLayer .markedContent {
      display: contents;
    }

    .textLayer span[role="img"] {
      user-select: none;
      cursor: default;
    }

    .textLayer ::selection {
      background: rgba(8, 127, 114, 0.28);
    }

    .textLayer br::selection {
      background: transparent;
    }

    .search-highlight-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .search-highlight {
      position: absolute;
      border-radius: 3px;
      background: rgba(250, 204, 21, 0.42);
      mix-blend-mode: multiply;
    }

    .search-highlight.current {
      background: rgba(8, 127, 114, 0.34);
      outline: 2px solid rgba(8, 127, 114, 0.62);
      outline-offset: 1px;
    }

    .reader-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      min-height: 38px;
      padding: 9px 14px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.86);
      border-top: 1px solid rgba(32, 35, 34, 0.12);
      font-size: 0.88rem;
      line-height: 1.25;
    }

    .reader-status-text {
      min-width: min(100%, 18rem);
    }

    .page-analysis-status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid #d8ddda;
      border-radius: 999px;
      padding: 3px 9px;
      color: #4f5754;
      background: #f7f9f8;
      font-size: 0.78rem;
      font-weight: 680;
      white-space: nowrap;
    }

    .page-analysis-status.is-searchable {
      color: #06695e;
      background: #e8f5f2;
      border-color: #b9ddd6;
    }

    .page-analysis-status.is-mixed {
      color: #315b8f;
      background: #edf4ff;
      border-color: #c6d9f4;
    }

    .page-analysis-status.is-ocr {
      color: #845900;
      background: #fff5d6;
      border-color: #ead18a;
    }

    .page-analysis-status.is-limited,
    .page-analysis-status.is-unknown {
      color: #6c5662;
      background: #faf0f4;
      border-color: #e4c9d4;
    }

    .page-analysis-status.is-pending {
      color: var(--muted);
      background: #f7f9f8;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 640px) {
      .app {
        padding: 10px;
        gap: 10px;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .pdf-toolbar {
        justify-content: stretch;
      }

      .control-group {
        justify-content: center;
        flex: 1 1 100%;
      }

      .document-name {
        max-width: 100%;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
      }

      .button {
        min-width: 0;
        width: 100%;
      }

      .empty-state {
        min-height: 320px;
        padding: 24px;
      }

      .reader-body {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .reader-body.outline-hidden {
        grid-template-rows: minmax(0, 1fr);
      }

      .outline-panel {
        max-height: 210px;
        border-right: 0;
        border-bottom: 1px solid rgba(32, 35, 34, 0.14);
      }

      .canvas-scroll {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="toolbar" aria-label="PDF reader controls">
      <div class="brand">
        <h1>PDF Reader</h1>
        <p class="document-name" id="documentName">No PDF open</p>
      </div>

      <div class="actions">
        <button class="button" type="button" id="openButton">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M12 3v12"></path>
            <path d="m7 10 5 5 5-5"></path>
            <path d="M5 21h14"></path>
          </svg>
          <span>Open PDF</span>
        </button>

        <button class="button secondary" type="button" id="closeButton" disabled>
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
          <span>Close PDF</span>
        </button>
      </div>

      <input
        class="sr-only"
        type="file"
        id="pdfInput"
        accept="application/pdf,.pdf"
        aria-label="Choose PDF file"
      >
    </header>

    <nav class="pdf-toolbar" aria-label="PDF page, zoom, and view controls">
      <div class="control-group" aria-label="Page controls">
        <button
          class="icon-button"
          type="button"
          id="previousPageButton"
          title="Previous page"
          aria-label="Previous page"
          disabled
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m15 18-6-6 6-6"></path>
          </svg>
        </button>

        <label class="page-meter">
          <span class="sr-only">Page number</span>
          <input
            class="page-number"
            type="number"
            id="pageNumberInput"
            min="1"
            value="1"
            inputmode="numeric"
            disabled
          >
          <span class="total-pages" id="totalPages">of 0</span>
        </label>

        <button
          class="icon-button"
          type="button"
          id="nextPageButton"
          title="Next page"
          aria-label="Next page"
          disabled
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m9 18 6-6-6-6"></path>
          </svg>
        </button>
      </div>

      <div class="control-group" aria-label="Search controls">
        <input
          class="search-input"
          type="search"
          id="searchInput"
          placeholder="Search"
          aria-label="Search text"
          disabled
        >

        <button
          class="icon-button"
          type="button"
          id="previousMatchButton"
          title="Previous match"
          aria-label="Previous search match"
          disabled
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m18 15-6-6-6 6"></path>
          </svg>

      if (!cachedAnalysis || typeof cachedAnalysis.then === "function") {

        pageAnalysisStatus.textContent = pageAnalysisIndexing
          ? "Checking text..."
          : "Text status pending";
        pageAnalysisStatus.title = "Analyzing PDF text objects and page image operations.";
        return;
      }

      pageAnalysisStatus.className = `page-analysis-status ${cachedAnalysis.className}`;
      pageAnalysisStatus.textContent = cachedAnalysis.label;
      pageAnalysisStatus.title = cachedAnalysis.description;
    };

    const syncOutlineSidebar = () => {

      bookmarksToggleButton.setAttribute("aria-pressed", String(isOpen));

    };

      bookmarkStorageKey = null;
      userBookmarks = [];
      userBookmarkList.replaceChildren();
      userBookmarkEmpty.hidden = false;
      outlineList.replaceChildren();
      setOutlineStatus("No bookmarks");
      syncOutlineSidebar();
    };

    const formatZoom = () => `${Math.round(currentScale * 100)}%`;

    const updateSearchControls = () => {
      const hasDocument = Boolean(pdfDocument);
      const hasQuery = searchQuery.length > 0;
      const hasMatches = searchMatches.length > 0;

      searchInput.disabled = !hasDocument;
      previousMatchButton.disabled = !hasDocument || !hasMatches || isRendering;
      nextMatchButton.disabled = !hasDocument || !hasMatches || isRendering;

      if (!hasDocument || !hasQuery) {
        searchCount.value = "0 of 0";
        searchCount.textContent = "0 of 0";
        return;
      }

      if (searchIndexing && !hasMatches) {
        searchCount.value = "Indexing";
        searchCount.textContent = "Indexing";
        return;
      }

      if (!hasMatches) {
        searchCount.value = "No matches";
        searchCount.textContent = "No matches";
        return;
      }

      const selectedMatch = selectedSearchMatchIndex + 1;
      searchCount.value = `${selectedMatch} of ${searchMatches.length}`;
      searchCount.textContent = `${selectedMatch} of ${searchMatches.length}`;
    };

    const updateControls = () => {
      const hasDocument = Boolean(pdfDocument);
      const pageCount = pdfDocument ? pdfDocument.numPages : 0;

      previousPageButton.disabled = !hasDocument || isRendering || currentPageNumber <= 1;
      nextPageButton.disabled = !hasDocument || isRendering || currentPageNumber >= pageCount;
      pageNumberInput.disabled = !hasDocument || isRendering;
      pageNumberInput.max = String(Math.max(pageCount, 1));
      pageNumberInput.value = String(currentPageNumber);

      updatePageAnalysisStatus();
      syncOutlineSidebar();

      canvas.height = 0;

    const clearTextLayer = () => {

      searchHighlightLayer.removeAttribute("style");

      searchIndex = [];
      searchIndexing = false;
      searchQuery = "";
      searchMatches = [];
      selectedSearchMatchIndex = -1;

        searchInput.value = "";
      }

      searchHighlightLayer.replaceChildren();
      updateSearchControls();
    };

    const resetPageAnalysisState = () => {
      pageAnalysisCache = new Map();
      pageAnalysisIndexing = false;
      updatePageAnalysisStatus();
    };

      renderTask = null;
      task.cancel();

        await task.promise;

      currentScale = 1;

          if (includeMap) {

          }

      for (let index = 0; index < value.length; index += 1) {
        const character = value[index];

        if (/\s/.test(character)) {
          if (normalized.length > 0 && pendingWhitespaceIndex === null) {

          }

          continue;

        if (pendingWhitespaceIndex !== null) {
          normalized += " ";

          if (includeMap) {
            map.push(pendingWhitespaceIndex);
          }

          pendingWhitespaceIndex = null;
        }

        ? { text: normalized, map }

          label: "OCR needed",
          description:

          className: "is-limited",

          description:

            `${countDetails}.`,

          className: "is-unknown",
          label: "No text detected",
          description:
            "No searchable text or obvious page image was detected. " +
            `${countDetails}, ${operatorStats.vectorCount} vector ops.`,
        };
      }

      return {
        kind: "unknown",
        className: "is-unknown",
        label: "Text status unknown",
        description: `Text analysis could not classify this page. ${countDetails}.`,
      };
    };

      }

      if (textStats.hasSearchableText) {
        return createAnalysisDetails("digital-text", textStats, operatorStats);
      }

      if (hasImages) {
        return createAnalysisDetails("image-only", textStats, operatorStats);
      }

      if (textStats.hasAnyText) {
        return createAnalysisDetails("limited-text", textStats, operatorStats);
      }

      return createAnalysisDetails("vector-or-empty", textStats, operatorStats);

          return null;
        }

          inspectOperatorList(operatorList)

          } else {

          }

          }
        }

        return analysis;
      } catch (error) {
        if (pageAnalysisCache === activeCache) {
          const fallbackAnalysis = createAnalysisDetails("unknown", {
            characterCount: 0,
            wordCount: 0,
            hasAnyText: false,
            hasSearchableText: false,
          }, {
            imageCount: 0,
            textPaintCount: 0,
            vectorCount: 0,
          });
          activeCache.set(pageNumber, fallbackAnalysis);
          updatePageAnalysisStatus();
        }

        return null;
      }
    };

    const findMatchesInPage = (pageSearch, query) => {
      const matches = [];
      let searchFrom = 0;

      while (searchFrom < pageSearch.normalizedText.length) {
        const matchStart = pageSearch.normalizedText.indexOf(query, searchFrom);

        if (matchStart === -1) {
          break;
        }

        const matchEnd = matchStart + query.length;
        const rawStart = pageSearch.normalizedToRaw[matchStart];
        const rawEnd = pageSearch.normalizedToRaw[matchEnd - 1] + 1;

        if (Number.isInteger(rawStart) && Number.isInteger(rawEnd) && rawEnd > rawStart) {
          matches.push({
            pageNumber: pageSearch.pageNumber,
            normalizedStart: matchStart,
            normalizedEnd: matchEnd,
            rawStart,
            rawEnd,
          });
        }

        searchFrom = matchEnd;
      }

      return matches;
    };

    const createHighlightRange = (segment, match, textDivs) => {
      const textDiv = textDivs[segment.textItemIndex];
      const textNode = textDiv && textDiv.firstChild;

      if (!textNode || textNode.nodeType !== Node.TEXT_NODE) {
        return null;
      }

      const textLength = textNode.textContent.length;
      const startOffset = Math.max(0, match.rawStart - segment.start);
      const endOffset = Math.min(textLength, match.rawEnd - segment.start);

      if (endOffset <= startOffset) {
        return null;
      }

      const range = document.createRange();
      range.setStart(textNode, startOffset);
      range.setEnd(textNode, endOffset);
      return range;
    };

    const applySearchHighlights = (options = {}) => {
      const scrollToCurrent = Boolean(options.scrollToCurrent);
      searchHighlightLayer.replaceChildren();

      if (!searchQuery || searchMatches.length === 0 || !textLayerTask) {
        return;
      }

      const pageSearch = searchIndex[currentPageNumber - 1];

      if (!pageSearch) {
        return;
      }

      const textDivs = textLayerTask.textDivs || [];
      const layerRect = searchHighlightLayer.getBoundingClientRect();
      const fragment = document.createDocumentFragment();

      searchMatches.forEach((match, matchIndex) => {
        if (match.pageNumber !== currentPageNumber) {
          return;
        }

        const isCurrent = matchIndex === selectedSearchMatchIndex;
        const matchingSegments = pageSearch.segments.filter((segment) => (
          segment.end > match.rawStart && segment.start < match.rawEnd
        ));

        matchingSegments.forEach((segment) => {
          const range = createHighlightRange(segment, match, textDivs);

          if (!range) {
            return;
          }

          Array.from(range.getClientRects()).forEach((rect) => {
            if (rect.width <= 0 || rect.height <= 0) {
              return;
            }

            const highlight = document.createElement("div");
            highlight.className = isCurrent
              ? "search-highlight current"
              : "search-highlight";
            highlight.style.left = `${rect.left - layerRect.left}px`;
            highlight.style.top = `${rect.top - layerRect.top}px`;
            highlight.style.width = `${rect.width}px`;
            highlight.style.height = `${rect.height}px`;
            fragment.append(highlight);
          });

          range.detach?.();
        });
      });

      searchHighlightLayer.append(fragment);

      if (scrollToCurrent) {
        requestAnimationFrame(() => {
          searchHighlightLayer
            .querySelector(".search-highlight.current")
            ?.scrollIntoView({ block: "center", inline: "center", behavior: "smooth" });
        });
      }
    };

    const runSearch = (options = {}) => {
      const preserveSelection = Boolean(options.preserveSelection);
      const updateHighlights = options.updateHighlights !== false;
      const previousMatch = preserveSelection
        ? searchMatches[selectedSearchMatchIndex]
        : null;

      searchQuery = normalizeForSearch(searchInput.value).text;

      if (!searchQuery) {
        searchMatches = [];
        selectedSearchMatchIndex = -1;
        updateSearchControls();
        searchHighlightLayer.replaceChildren();
        return;
      }

      const nextMatches = [];

      searchIndex.forEach((pageSearch) => {
        if (pageSearch) {
          nextMatches.push(...findMatchesInPage(pageSearch, searchQuery));
        }
      });

      searchMatches = nextMatches;

      if (searchMatches.length === 0) {
        selectedSearchMatchIndex = -1;
      } else if (previousMatch) {
        const preservedIndex = searchMatches.findIndex((match) => (
          match.pageNumber === previousMatch.pageNumber &&
          match.rawStart === previousMatch.rawStart &&
          match.rawEnd === previousMatch.rawEnd
        ));

        selectedSearchMatchIndex = preservedIndex >= 0
          ? preservedIndex
          : Math.min(selectedSearchMatchIndex, searchMatches.length - 1);
      } else {
        selectedSearchMatchIndex = 0;
      }

      updateSearchControls();

      if (updateHighlights) {
        applySearchHighlights();
      }
    };

    const renderTextLayerForPage = async (page, viewport, pageNumber, loadId) => {
      if (!pdfjsLibrary || typeof pdfjsLibrary.TextLayer !== "function") {
        setStatus("Text selection is unavailable in this PDF.js build.");
        return;
      }

      try {
        const textContent = await getPageTextContent(pageNumber, page);

        if (!pdfDocument || loadId !== currentLoadId || pageNumber !== currentPageNumber) {
          return;
        }

        if (!searchIndex[pageNumber - 1]) {
          searchIndex[pageNumber - 1] = buildSearchPage(pageNumber, textContent);

          if (searchQuery) {
            runSearch({ preserveSelection: true, updateHighlights: false });
          }
        }

        if (!pageAnalysisCache.has(pageNumber)) {
          void getPageAnalysis(pageNumber, page, loadId);
          updatePageAnalysisStatus();
        }

        textLayerContainer.replaceChildren();
        searchHighlightLayer.replaceChildren();

        const layer = new pdfjsLibrary.TextLayer({
          textContentSource: textContent,
          container: textLayerContainer,
          viewport,
        });

        textLayerTask = layer;
        await layer.render();

        if (
          !pdfDocument ||
          loadId !== currentLoadId ||
          pageNumber !== currentPageNumber ||
          textLayerTask !== layer
        ) {
          return;
        }

        if (searchQuery) {
          runSearch({ preserveSelection: true });
        } else {
          applySearchHighlights();
        }
      } catch (error) {
        if (error && error.name === "AbortException") {
          return;
        }

        if (loadId === currentLoadId) {
          textLayerTask = null;
          textLayerContainer.replaceChildren();
          searchHighlightLayer.replaceChildren();
          setStatus("Text selection is unavailable for this page.");
        }
      }
    };

    const startTextIndexing = async (loadId) => {
      if (!pdfDocument || loadId !== currentLoadId) {
        return;
      }

      const activeDocument = pdfDocument;
      searchIndexing = true;
      pageAnalysisIndexing = true;
      updateSearchControls();
      updatePageAnalysisStatus();

      for (let pageNumber = 1; pageNumber <= activeDocument.numPages; pageNumber += 1) {
        if (!pdfDocument || pdfDocument !== activeDocument || loadId !== currentLoadId) {
          return;
        }

        if (!searchIndex[pageNumber - 1]) {
          try {
            const page = await activeDocument.getPage(pageNumber);
            const textContent = await getPageTextContent(pageNumber, page);

            if (!pdfDocument || pdfDocument !== activeDocument || loadId !== currentLoadId) {
              return;
            }

            searchIndex[pageNumber - 1] = buildSearchPage(pageNumber, textContent);
          } catch (error) {
            if (!pdfDocument || pdfDocument !== activeDocument || loadId !== currentLoadId) {
              return;
            }

            searchIndex[pageNumber - 1] = buildSearchPage(pageNumber, { items: [] });
          }

          if (searchQuery) {
            runSearch({ preserveSelection: true });
          }
        }

        if (!pageAnalysisCache.has(pageNumber)) {
          const page = await activeDocument.getPage(pageNumber);
          await getPageAnalysis(pageNumber, page, loadId);
        }

        await new Promise((resolve) => {
          setTimeout(resolve, 0);
        });
      }

      if (pdfDocument === activeDocument && loadId === currentLoadId) {
        searchIndexing = false;
        pageAnalysisIndexing = false;
        runSearch({ preserveSelection: true });
        updateSearchControls();
        updatePageAnalysisStatus();
      }
    };

    const renderPage = async (pageNumber, loadId) => {
      if (!pdfDocument || loadId !== currentLoadId) {
        return;
      }

      await cancelRender();
      clearTextLayer();
      isRendering = true;
      updateControls();

      let page;

      try {
        page = await pdfDocument.getPage(pageNumber);
      } catch (error) {
        isRendering = false;
        updateControls();
        throw error;
      }

      if (loadId !== currentLoadId) {
        isRendering = false;
        updateControls();
        return;
      }

      const scale = getRenderScale(page);
      const viewport = page.getViewport({ scale });
      const outputScale = window.devicePixelRatio || 1;
      const viewportWidth = Math.floor(viewport.width);
      const viewportHeight = Math.floor(viewport.height);

      canvas.width = Math.floor(viewport.width * outputScale);
      canvas.height = Math.floor(viewport.height * outputScale);
      canvas.style.width = `${viewportWidth}px`;
      canvas.style.height = `${viewportHeight}px`;
      pageShell.style.width = `${viewportWidth}px`;
      pageShell.style.height = `${viewportHeight}px`;
      textLayerContainer.style.width = `${viewportWidth}px`;
      textLayerContainer.style.height = `${viewportHeight}px`;
      searchHighlightLayer.style.width = `${viewportWidth}px`;
      searchHighlightLayer.style.height = `${viewportHeight}px`;

      const transform = outputScale === 1
        ? null
        : [outputScale, 0, 0, outputScale, 0, 0];

      const task = page.render({
        canvasContext,
        viewport,
        transform,
      });

      renderTask = task;

      try {
        await task.promise;

        if (loadId === currentLoadId && pdfDocument) {
          await renderTextLayerForPage(page, viewport, pageNumber, loadId);
        }
      } catch (error) {
        if (error && error.name === "RenderingCancelledException") {
          return;
        }

        throw error;
      } finally {
        if (renderTask === task) {
          renderTask = null;
        }

        isRendering = false;
        updateControls();
      }

      if (loadId === currentLoadId && pdfDocument) {
        updateControls();
      }
    };

    const renderCurrentPage = () => renderPage(currentPageNumber, currentLoadId);

    const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

    const goToPage = async (pageNumber) => {
      if (!pdfDocument || isRendering) {
        updateControls();
        return;
      }

      const nextPage = clamp(pageNumber, 1, pdfDocument.numPages);

      if (nextPage === currentPageNumber) {
        updateControls();
        return;
      }

      currentPageNumber = nextPage;
      updateControls();
      await renderCurrentPage();
    };

    const goToSearchMatch = async (matchIndex) => {
      if (!pdfDocument || isRendering || searchMatches.length === 0) {
        updateSearchControls();
        return;
      }

      selectedSearchMatchIndex = (
        (matchIndex % searchMatches.length) + searchMatches.length
      ) % searchMatches.length;

      const match = searchMatches[selectedSearchMatchIndex];
      updateSearchControls();

      if (match.pageNumber !== currentPageNumber) {
        await goToPage(match.pageNumber);
      }

      applySearchHighlights({ scrollToCurrent: true });
      updateSearchControls();
      setStatus(
        `Match ${selectedSearchMatchIndex + 1} of ${searchMatches.length} - page ${match.pageNumber}`
      );
    };

    const getAdjacentSearchMatchIndex = (direction) => {
      if (searchMatches.length === 0) {
        return -1;
      }

      if (selectedSearchMatchIndex < 0) {
        return direction > 0 ? 0 : searchMatches.length - 1;
      }

      const selectedMatch = searchMatches[selectedSearchMatchIndex];

      if (selectedMatch && selectedMatch.pageNumber !== currentPageNumber) {
        return selectedSearchMatchIndex;
      }

      return selectedSearchMatchIndex + direction;
    };

    const goToNextSearchMatch = () => {
      const matchIndex = getAdjacentSearchMatchIndex(1);

      if (matchIndex >= 0) {
        goToSearchMatch(matchIndex);
      }
    };

    const goToPreviousSearchMatch = () => {
      const matchIndex = getAdjacentSearchMatchIndex(-1);

      if (matchIndex >= 0) {
        goToSearchMatch(matchIndex);
      }
    };

    const setZoom = async (nextScale) => {
      if (!pdfDocument || isRendering) {
        return;
      }

      fitWidthEnabled = false;
      currentScale = clamp(nextScale, MIN_SCALE, MAX_SCALE);
      updateControls();
      await renderCurrentPage();
    };

    const setFitWidth = async () => {
      if (!pdfDocument || isRendering || fitWidthEnabled) {
        return;
      }

      fitWidthEnabled = true;
      updateControls();
      await renderCurrentPage();
    };

    const setOutlineSidebarOpen = async (isOpen) => {
      if (!pdfDocument || isRendering) {
        return;
      }

      outlineSidebarOpen = isOpen;
      syncOutlineSidebar();

      if (fitWidthEnabled) {
        await renderCurrentPage();
      }
    };

    const createBookmarkStorageKey = (file) => {
      const identity = `${file.name}:${file.size}:${file.lastModified}`;
      return `${BOOKMARK_STORAGE_PREFIX}${encodeURIComponent(identity)}`;
    };

    const createBookmarkId = () => {
      if (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") {
        return crypto.randomUUID();
      }

      return `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    };

    const normalizeStoredBookmarks = (storedBookmarks) => {
      if (!Array.isArray(storedBookmarks) || !pdfDocument) {
        return [];
      }

      return storedBookmarks
        .map((bookmark) => ({
          id: typeof bookmark.id === "string" ? bookmark.id : createBookmarkId(),
          title: typeof bookmark.title === "string" && bookmark.title.trim()
            ? bookmark.title.trim()
            : `Page ${bookmark.page}`,
          page: Number.parseInt(bookmark.page, 10),
        }))
        .filter((bookmark) => Number.isInteger(bookmark.page))
        .map((bookmark) => ({
          ...bookmark,
          page: clamp(bookmark.page, 1, pdfDocument.numPages),
        }));
    };

    const loadUserBookmarks = (file) => {
      bookmarkStorageKey = createBookmarkStorageKey(file);

      try {
        const storedValue = localStorage.getItem(bookmarkStorageKey);
        userBookmarks = normalizeStoredBookmarks(JSON.parse(storedValue || "[]"));
      } catch (error) {
        userBookmarks = [];
        setOutlineStatus("Saved bookmarks unavailable");
      }

      renderUserBookmarks();
    };

    const saveUserBookmarks = () => {
      if (!bookmarkStorageKey) {
        return;
      }

      try {
        localStorage.setItem(bookmarkStorageKey, JSON.stringify(userBookmarks));
      } catch (error) {
        setOutlineStatus("Could not save bookmarks");
      }
    };

    const createBookmarkActionButton = (label, paths, options = {}) => {
      const button = document.createElement("button");
      button.className = options.danger ? "bookmark-action danger" : "bookmark-action";
      button.type = "button";
      button.title = label;
      button.setAttribute("aria-label", label);
      button.innerHTML = `
        <svg aria-hidden="true" viewBox="0 0 24 24">
          ${paths}
        </svg>
      `;
      return button;
    };

    const renderUserBookmarkEditor = (bookmark, listItem) => {
      listItem.replaceChildren();
      listItem.className = "user-bookmark-item";

      const editor = document.createElement("div");
      editor.className = "bookmark-editor";

      const input = document.createElement("input");
      input.className = "bookmark-edit-input";
      input.type = "text";
      input.value = bookmark.title;
      input.setAttribute("aria-label", "Bookmark title");

      const actions = document.createElement("div");
      actions.className = "bookmark-actions";

      const saveButton = createBookmarkActionButton(
        "Save bookmark",
        '<path d="m5 12 4 4L19 6"></path>'
      );
      const cancelButton = createBookmarkActionButton(
        "Cancel edit",
        '<path d="M18 6 6 18"></path><path d="m6 6 12 12"></path>'
      );

      const finishEdit = () => {
        const title = input.value.trim() || `Page ${bookmark.page}`;
        userBookmarks = userBookmarks.map((existingBookmark) => (
          existingBookmark.id === bookmark.id
            ? { ...existingBookmark, title }
            : existingBookmark
        ));
        saveUserBookmarks();
        renderUserBookmarks();
        setOutlineStatus("Bookmark renamed");
      };

      saveButton.addEventListener("click", finishEdit);
      cancelButton.addEventListener("click", renderUserBookmarks);
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          finishEdit();
        }

        if (event.key === "Escape") {
          event.preventDefault();
          renderUserBookmarks();
        }
      });

      actions.append(saveButton, cancelButton);
      editor.append(input, actions);
      listItem.append(editor);
      input.focus();
      input.select();
    };

    const renderUserBookmarks = () => {
      userBookmarkList.replaceChildren();
      userBookmarkEmpty.hidden = userBookmarks.length > 0;

      userBookmarks.forEach((bookmark) => {
        const listItem = document.createElement("li");
        listItem.className = "user-bookmark-item";

        const pageButton = document.createElement("button");
        pageButton.className = "user-bookmark-link";
        pageButton.type = "button";
        pageButton.title = `Go to page ${bookmark.page}`;

        const title = document.createElement("span");
        title.className = "bookmark-title";
        title.textContent = bookmark.title;

        const page = document.createElement("span");
        page.className = "bookmark-page";
        page.textContent = `Page ${bookmark.page}`;

        pageButton.append(title, page);
        pageButton.addEventListener("click", async () => {
          await goToPage(bookmark.page);
          setOutlineStatus(`Page ${bookmark.page}`);
        });

        const actions = document.createElement("div");
        actions.className = "bookmark-actions";

        const editButton = createBookmarkActionButton(
          "Edit bookmark",
          '<path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>'
        );
        const removeButton = createBookmarkActionButton(
          "Remove bookmark",
          '<path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path>',
          { danger: true }
        );

        editButton.addEventListener("click", () => {
          renderUserBookmarkEditor(bookmark, listItem);
        });

        removeButton.addEventListener("click", () => {
          userBookmarks = userBookmarks.filter((existingBookmark) => (
            existingBookmark.id !== bookmark.id
          ));
          saveUserBookmarks();
          renderUserBookmarks();
          setOutlineStatus("Bookmark removed");
        });

        actions.append(editButton, removeButton);
        listItem.append(pageButton, actions);
        userBookmarkList.append(listItem);
      });
    };

    const addCurrentPageBookmark = async () => {
      if (!pdfDocument) {
        return;
      }

      const bookmarksOnPage = userBookmarks.filter((bookmark) => (
        bookmark.page === currentPageNumber
      )).length;
      const title = bookmarksOnPage === 0
        ? `Page ${currentPageNumber}`
        : `Page ${currentPageNumber} bookmark ${bookmarksOnPage + 1}`;

      userBookmarks = [
        ...userBookmarks,
        {
          id: createBookmarkId(),
          title,
          page: currentPageNumber,
        },
      ];

      saveUserBookmarks();
      renderUserBookmarks();
      setOutlineStatus(`Saved page ${currentPageNumber}`);

      if (!outlineSidebarOpen) {
        await setOutlineSidebarOpen(true);
      }
    };

    const resolveDestinationPage = async (destination) => {
      if (!pdfDocument || !destination) {
        return null;
      }

      let explicitDestination = destination;

      if (typeof explicitDestination === "string") {
        explicitDestination = await pdfDocument.getDestination(explicitDestination);
      }

      if (!Array.isArray(explicitDestination) || explicitDestination.length === 0) {
        return null;
      }

      const pageReference = explicitDestination[0];
      let pageIndex = null;

      if (Number.isInteger(pageReference)) {
        pageIndex = pageReference;
      } else if (pageReference && typeof pageReference === "object") {
        pageIndex = await pdfDocument.getPageIndex(pageReference);
      }

      if (!Number.isInteger(pageIndex)) {
        return null;
      }

      return clamp(pageIndex + 1, 1, pdfDocument.numPages);
    };

    const activateOutlineItem = async (item, button) => {
      if (!item.dest || button.disabled) {
        return;
      }

      const originalText = button.textContent;
      button.disabled = true;
      button.textContent = "Opening...";

      try {
        const pageNumber = await resolveDestinationPage(item.dest);

        if (pageNumber) {
          await goToPage(pageNumber);
          setOutlineStatus(`Page ${pageNumber}`);
        } else {
          setOutlineStatus("Bookmark target unavailable");
        }
      } catch (error) {
        setOutlineStatus("Bookmark target unavailable");
      } finally {
        button.disabled = false;
        button.textContent = originalText;
      }
    };

    const renderOutlineItems = (items) => {
      const fragment = document.createDocumentFragment();

      items.forEach((item) => {
        const listItem = document.createElement("li");
        listItem.className = "outline-item";

        const button = document.createElement("button");
        button.className = "outline-button";
        button.type = "button";
        button.textContent = item.title || "Untitled bookmark";

        if (item.bold) {
          button.classList.add("is-bold");
        }

        if (item.italic) {
          button.classList.add("is-italic");
        }

        if (item.dest) {
          button.addEventListener("click", () => {
            activateOutlineItem(item, button);
          });
        } else {
          button.disabled = true;
          button.title = item.url ? "External bookmark links are not opened here" : "Bookmark target unavailable";
        }

        listItem.append(button);

        if (Array.isArray(item.items) && item.items.length > 0) {
          const childList = document.createElement("ol");
          childList.className = "outline-list";
          childList.append(renderOutlineItems(item.items));
          listItem.append(childList);
        }

        fragment.append(listItem);
      });

      return fragment;
    };

    const countOutlineItems = (items) => items.reduce((count, item) => {
      const childItems = Array.isArray(item.items) ? item.items : [];
      return count + 1 + countOutlineItems(childItems);
    }, 0);

    const loadOutline = async (loadId) => {
      if (!pdfDocument || loadId !== currentLoadId) {
        return;
      }

      outlineList.replaceChildren();
      setOutlineStatus("Loading...");
      syncOutlineSidebar();

      try {
        const outline = await pdfDocument.getOutline();

        if (!pdfDocument || loadId !== currentLoadId) {
          return;
        }

        if (!Array.isArray(outline) || outline.length === 0) {
          setOutlineStatus("No bookmarks");
          syncOutlineSidebar();
          return;
        }

        outlineList.replaceChildren(renderOutlineItems(outline));
        setOutlineStatus(`${countOutlineItems(outline)} bookmarks`);
        syncOutlineSidebar();
      } catch (error) {
        if (loadId === currentLoadId) {
          setOutlineStatus("Bookmarks unavailable");
          syncOutlineSidebar();
        }
      }
    };

    const isTextEntryElement = (element) => {
      if (!element) {
        return false;
      }

      const tagName = element.tagName;
      return element.isContentEditable ||
        tagName === "INPUT" ||
        tagName === "TEXTAREA" ||
        tagName === "SELECT";
    };

    const openDocument = async (file) => {
      const loadId = currentLoadId + 1;
      currentLoadId = loadId;

      await cancelRender();
      clearTextLayer();
      resetSearchState();
      resetPageAnalysisState();

      if (pdfDocument) {
        await pdfDocument.destroy();
        pdfDocument = null;
      }

      resetCanvas();
      clearOutline();
      currentPageNumber = 1;
      currentScale = 1;
      fitWidthEnabled = false;
      updateControls();
      setDocumentName(file.name);
      closeButton.disabled = false;
      showEmptyState("Opening PDF", "Preparing the document.");

      try {
        const pdfjs = await loadPdfJsLibrary();
        const fileBytes = new Uint8Array(await file.arrayBuffer());

        const loadingTask = pdfjs.getDocument({
          data: fileBytes,
          cMapUrl: getAssetUrl(PDFJS_CMAPS),
          cMapPacked: true,
          standardFontDataUrl: getAssetUrl(PDFJS_STANDARD_FONTS),
          wasmUrl: getAssetUrl(PDFJS_WASM),
        });

        const loadedDocument = await loadingTask.promise;

        if (loadId !== currentLoadId) {
          await loadedDocument.destroy();
          return;
        }

        pdfDocument = loadedDocument;
        currentPageNumber = 1;
        fitWidthEnabled = false;
        loadUserBookmarks(file);

        showCanvasState();
        updateControls();
        loadOutline(loadId);
        startTextIndexing(loadId);
        await renderCurrentPage();
      } catch (error) {
        if (loadId !== currentLoadId) {
          return;
        }

        await cancelRender();
        clearTextLayer();
        resetSearchState();
        resetPageAnalysisState();

        if (pdfDocument) {
          await pdfDocument.destroy();
          pdfDocument = null;
        }

        resetCanvas();
        clearOutline();
        currentPageNumber = 1;
        currentScale = 1;
        fitWidthEnabled = false;
        closeButton.disabled = true;
        pdfInput.value = "";
        setDocumentName("No PDF open");
        updateControls();
        showEmptyState("PDF.js unavailable", error.message || "The document could not be rendered.");
      }
    };

    openButton.addEventListener("click", () => {
      pdfInput.click();
    });

    closeButton.addEventListener("click", () => {
      closeDocument();
    });

    previousPageButton.addEventListener("click", () => {
      goToPage(currentPageNumber - 1);
    });

    nextPageButton.addEventListener("click", () => {
      goToPage(currentPageNumber + 1);
    });

    pageNumberInput.addEventListener("change", () => {
      const requestedPage = Number.parseInt(pageNumberInput.value, 10);

      if (Number.isNaN(requestedPage)) {
        updateControls();
        return;
      }

      goToPage(requestedPage);
    });

    searchInput.addEventListener("input", () => {
      runSearch();
    });

    searchInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();

        if (event.shiftKey) {
          goToPreviousSearchMatch();
        } else {
          goToNextSearchMatch();
        }
      }

      if (event.key === "Escape") {
        event.preventDefault();
        searchInput.value = "";
        runSearch();
      }
    });

    previousMatchButton.addEventListener("click", () => {
      goToPreviousSearchMatch();
    });

    nextMatchButton.addEventListener("click", () => {
      goToNextSearchMatch();
    });

    zoomOutButton.addEventListener("click", () => {
      setZoom(currentScale - ZOOM_STEP);
    });

    zoomInButton.addEventListener("click", () => {
      setZoom(currentScale + ZOOM_STEP);
    });

    fitWidthButton.addEventListener("click", () => {
      setFitWidth();
    });

    bookmarksToggleButton.addEventListener("click", () => {
      setOutlineSidebarOpen(!outlineSidebarOpen);
    });

    addBookmarkButton.addEventListener("click", () => {
      addCurrentPageBookmark();
    });

    pdfInput.addEventListener("change", () => {
      const file = pdfInput.files && pdfInput.files[0];

      if (!file) {
        return;
      }

      const looksLikePdf =
        file.type === "application/pdf" ||
        file.name.toLowerCase().endsWith(".pdf");

      if (!looksLikePdf) {
        closeDocument();
        showEmptyState("Choose a PDF file", "The selected file is not a PDF.");
        return;
      }

      openDocument(file);
    });

    window.addEventListener("resize", () => {
      if (!pdfDocument || !fitWidthEnabled) {
        return;
      }

      if (resizeFrame) {
        cancelAnimationFrame(resizeFrame);
      }

      resizeFrame = requestAnimationFrame(() => {
        resizeFrame = null;
        renderCurrentPage();
      });
    });

    window.addEventListener("keydown", (event) => {
      if (
        pdfDocument &&
        !event.defaultPrevented &&
        !event.altKey &&
        (event.ctrlKey || event.metaKey) &&
        event.key.toLowerCase() === "f"
      ) {
        event.preventDefault();
        searchInput.focus();
        searchInput.select();
        return;
      }

      if (
        !pdfDocument ||
        event.defaultPrevented ||
        event.altKey ||
        event.ctrlKey ||
        event.metaKey ||
        isTextEntryElement(document.activeElement)
      ) {
        return;
      }

      if (event.key === "ArrowLeft") {
        event.preventDefault();
        goToPage(currentPageNumber - 1);
      }

      if (event.key === "ArrowRight") {
        event.preventDefault();
        goToPage(currentPageNumber + 1);
      }
    });

    window.addEventListener("beforeunload", () => {
      if (pdfDocument) {
        pdfDocument.destroy();
      }
    });

    updateControls();
  </script>
</body>
</html>
